<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store News Dashboard — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-animated { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .orb-1 { width: 600px; height: 600px; background: #3b82f6; top: -200px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 500px; height: 500px; background: #8b5cf6; top: 30%; right: -200px; animation-delay: -4s; }
        .orb-3 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; left: 30%; animation-delay: -8s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -40px) scale(1.05); }
            66%       { transform: translate(-20px, 20px) scale(0.97); }
        }

        .grid-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(99, 130, 246, 0.6);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(99, 130, 246, 0.1);
        }
        .input-field::placeholder { color: rgba(148, 163, 184, 0.5); }

        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            transition: all 0.2s;
        }
        .btn-login:hover:not(:disabled) {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .logo-glow {
            filter: drop-shadow(0 0 16px rgba(99, 130, 246, 0.5));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease forwards; }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Animated background -->
    <div class="bg-animated">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-overlay"></div>

    <!-- Login card -->
    <div class="relative z-10 w-full max-w-md px-4 fade-in">
        <div class="glass-card rounded-2xl p-8 shadow-2xl">

            <!-- Logo / Title -->
            <div class="text-center mb-8">
                <div class="logo-glow inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
                     style="background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(99,102,241,0.2)); border: 1px solid rgba(99,130,246,0.3);">
                    <i class="fa-solid fa-store text-blue-400 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Store News Dashboard</h1>
                <p class="text-slate-400 text-sm mt-1">Sign in to access your analyst portal</p>
            </div>

            <!-- Error message -->
            <div id="errorBox" class="error-box rounded-lg px-4 py-3 text-sm mb-5 hidden flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                <span id="errorMsg"></span>
            </div>

            <!-- Login form -->
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Email address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-slate-500">
                            <i class="fa-solid fa-envelope text-sm"></i>
                        </span>
                        <input
                            id="email"
                            type="email"
                            placeholder="you@retailstat.com"
                            required
                            autocomplete="email"
                            class="input-field w-full rounded-lg pl-9 pr-4 py-3 text-sm"
                        />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-slate-500">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input
                            id="password"
                            type="password"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                            class="input-field w-full rounded-lg pl-9 pr-10 py-3 text-sm"
                        />
                        <button type="button" id="togglePw"
                            class="absolute inset-y-0 right-3 flex items-center text-slate-500 hover:text-slate-300 transition-colors">
                            <i class="fa-solid fa-eye text-sm" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="btn-login w-full text-white font-semibold py-3 rounded-lg text-sm mt-2 flex items-center justify-center gap-2">
                    <span id="btnText">Sign in</span>
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center text-xs text-slate-600 mt-8">
                Access restricted to authorised RetailStat analysts only.
            </p>
        </div>
    </div>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL  = "https://ffxkqaetxxpbtwvljmhv.supabase.co";
        const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmeGtxYWV0eHhwYnR3dmxqbWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDE5NjIsImV4cCI6MjA5Mjk3Nzk2Mn0.qwYStWgM5DKQhJX3EtC2rjwMk49aejosEJmW5b60h8U";

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

        // If already logged in, skip the login page
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.replace("./index.html");
        })();

        // Toggle password visibility
        const togglePw = document.getElementById("togglePw");
        const eyeIcon  = document.getElementById("eyeIcon");
        const pwInput  = document.getElementById("password");
        togglePw.addEventListener("click", () => {
            const show = pwInput.type === "password";
            pwInput.type = show ? "text" : "password";
            eyeIcon.className = show ? "fa-solid fa-eye-slash text-sm" : "fa-solid fa-eye text-sm";
        });

        // Login form submit
        const form      = document.getElementById("loginForm");
        const errorBox  = document.getElementById("errorBox");
        const errorMsg  = document.getElementById("errorMsg");
        const submitBtn = document.getElementById("submitBtn");
        const btnText   = document.getElementById("btnText");

        function showError(msg) {
            errorMsg.textContent = msg;
            errorBox.classList.remove("hidden");
            errorBox.classList.add("flex");
        }
        function hideError() {
            errorBox.classList.add("hidden");
            errorBox.classList.remove("flex");
        }
        function setLoading(loading) {
            submitBtn.disabled = loading;
            btnText.innerHTML  = loading
                ? '<span class="spinner"></span> Signing in...'
                : 'Sign in';
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const email    = document.getElementById("email").value.trim().toLowerCase();
            const password = document.getElementById("password").value;

            const { error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                setLoading(false);
                if (error.message.includes("Invalid login credentials")) {
                    showError("Incorrect email or password. Please try again.");
                } else if (error.message.includes("Email not confirmed")) {
                    showError("Account not yet confirmed. Please contact your administrator.");
                } else {
                    showError(error.message);
                }
                return;
            }

            // Success — redirect to dashboard
            window.location.replace("./index.html");
        });
    </script>
</body>
</html>
