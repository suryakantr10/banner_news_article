<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store News Dashboard — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue: #3b82f6;
            --indigo: #6366f1;
            --purple: #8b5cf6;
            --bg: #0a0f1e;
            --card: rgba(13, 20, 40, 0.85);
            --muted: #64748b;
            --text: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text);
        }

        /* ── Canvas particles ── */
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* ── Orbs ── */
        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(90px); opacity: 0.14;
            animation: orbFloat 14s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 { width: 600px; height: 600px; background: #3b82f6; top: -200px; left: -150px; }
        .orb-2 { width: 500px; height: 500px; background: #8b5cf6; top: 30%; right: -200px; animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; left: 30%; animation-delay: -9s; }
        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(30px,-40px) scale(1.06); }
            66%      { transform: translate(-20px,20px) scale(0.96); }
        }

        /* ── Grid ── */
        .grid-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── Card wrapper ── */
        .card-wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; padding: 1rem;
            animation: cardIn 0.65s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Animated border ── */
        .card-border {
            border-radius: 22px; padding: 1.5px;
            background: linear-gradient(135deg, rgba(99,102,241,0.5), rgba(59,130,246,0.15), rgba(139,92,246,0.4), rgba(6,182,212,0.2));
            background-size: 300% 300%;
            animation: borderAnim 6s ease infinite;
        }
        @keyframes borderAnim {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        /* ── Card ── */
        .card {
            background: var(--card);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 21px;
            padding: 2.25rem 2.25rem 1.75rem;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%);
            width: 55%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.55), transparent);
        }

        /* ── Shake ── */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-9px); }
            40%      { transform: translateX(9px); }
            60%      { transform: translateX(-5px); }
            80%      { transform: translateX(5px); }
        }
        .shake { animation: shake 0.42s ease; }

        /* ── Logo ── */
        .logo-wrap { display: flex; justify-content: center; margin-bottom: 1.4rem; }
        .logo { position: relative; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; }
        .logo-inner {
            width: 60px; height: 60px; border-radius: 16px; position: relative; z-index: 1;
            background: linear-gradient(135deg, rgba(59,130,246,0.22), rgba(99,102,241,0.22));
            border: 1px solid rgba(99,130,246,0.35);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-inner i { color: #60a5fa; font-size: 1.5rem; }
        .ring {
            position: absolute; border-radius: 20px;
            border: 1px solid rgba(99,102,241,0.4);
            animation: ringPulse 2.8s ease-in-out infinite;
        }
        .ring-1 { inset: -4px; border-radius: 22px; }
        .ring-2 { inset: -10px; border-radius: 26px; border-color: rgba(99,102,241,0.15); animation-delay: 0.9s; }
        @keyframes ringPulse {
            0%,100% { opacity: 0.7; transform: scale(1); }
            50%      { opacity: 0.2; transform: scale(1.06); }
        }

        /* ── Heading ── */
        .heading { text-align: center; margin-bottom: 1.75rem; }
        .heading h1 { font-size: 1.45rem; font-weight: 700; color: #fff; margin-bottom: 0.35rem; letter-spacing: -0.01em; }
        .heading p  { font-size: 0.83rem; color: var(--muted); min-height: 1.2em; }
        .typed { color: #818cf8; font-weight: 500; }
        .cursor { color: #818cf8; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Alert ── */
        .alert {
            border-radius: 10px; padding: 0.7rem 0.9rem;
            font-size: 0.81rem; margin-bottom: 1.1rem;
            display: none; align-items: flex-start; gap: 0.55rem; line-height: 1.5;
        }
        .alert.show { display: flex; }
        .alert.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  color: #fca5a5; }
        .alert.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }

        /* ── Floating label inputs ── */
        .field { position: relative; margin-bottom: 1rem; }
        .field input {
            width: 100%;
            padding: 1.05rem 2.6rem 0.35rem 2.6rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 12px; color: var(--text);
            font-size: 0.88rem; font-family: inherit;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
            outline: none;
        }
        .field input:focus {
            border-color: rgba(99,102,241,0.55);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .field input.valid { border-color: rgba(16,185,129,0.4); }
        .field label {
            position: absolute; left: 2.6rem; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 0.86rem;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none;
        }
        .field input:focus ~ label,
        .field input:not(:placeholder-shown) ~ label {
            top: 0.42rem; transform: translateY(0);
            font-size: 0.66rem; color: #818cf8;
        }
        .field input.valid:not(:focus) ~ label { color: #34d399; }
        .f-icon {
            position: absolute; left: 0.85rem; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 0.78rem;
            pointer-events: none; transition: color 0.2s;
        }
        .field input:focus ~ .f-icon { color: #818cf8; }
        .valid-icon {
            position: absolute; right: 0.9rem; top: 50%;
            transform: translateY(-50%);
            color: #34d399; font-size: 0.75rem;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .field input.valid ~ .valid-icon { opacity: 1; }
        .pw-btn {
            position: absolute; right: 0.85rem; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--muted); font-size: 0.78rem; padding: 0.2rem;
            transition: color 0.2s;
        }
        .pw-btn:hover { color: var(--text); }

        /* ── Remember + Forgot row ── */
        .extras {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 1.35rem;
        }
        .remember {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.8rem; color: var(--muted);
            cursor: pointer; user-select: none;
        }
        .remember input { display: none; }
        .track {
            width: 30px; height: 17px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 99px; position: relative;
            transition: all 0.25s;
        }
        .track::after {
            content: ''; position: absolute;
            left: 2px; top: 2px;
            width: 11px; height: 11px;
            background: var(--muted); border-radius: 50%;
            transition: all 0.25s;
        }
        .remember input:checked ~ .track { background: rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.5); }
        .remember input:checked ~ .track::after { left: 15px; background: #818cf8; }
        .forgot-btn {
            background: none; border: none;
            font-size: 0.8rem; color: #818cf8;
            cursor: pointer; transition: color 0.2s; font-family: inherit;
        }
        .forgot-btn:hover { color: #a5b4fc; }

        /* ── Primary button ── */
        .btn {
            width: 100%; padding: 0.82rem;
            border: none; border-radius: 12px;
            font-size: 0.88rem; font-weight: 600;
            font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: all 0.25s; position: relative; overflow: hidden;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(99,102,241,0.4);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Ripple */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.22);
            transform: scale(0);
            animation: rippleOut 0.55s linear forwards;
            pointer-events: none;
        }
        @keyframes rippleOut { to { transform: scale(4.5); opacity: 0; } }

        /* Spinner */
        .spin {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spinAnim 0.65s linear infinite;
        }
        @keyframes spinAnim { to { transform: rotate(360deg); } }

        /* Success check pop */
        @keyframes popIn {
            0% { transform: scale(0); } 65% { transform: scale(1.2); } 100% { transform: scale(1); }
        }
        .pop { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }

        /* ── Back button ── */
        .back-btn {
            background: none; border: none;
            color: var(--muted); font-size: 0.8rem;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; gap: 0.4rem;
            margin-bottom: 1rem; transition: color 0.2s; padding: 0;
        }
        .back-btn:hover { color: var(--text); }

        /* ── View transitions ── */
        .view { animation: fadeSlideIn 0.3s ease; }
        .view.hidden { display: none; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(10px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Footer ── */
        .footer {
            text-align: center; margin-top: 1.5rem;
            font-size: 0.72rem; color: rgba(100,116,139,0.35);
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-bg"></div>

<div class="card-wrap">
    <div class="card-border">
        <div class="card" id="mainCard">

            <!-- Logo -->
            <div class="logo-wrap">
                <div class="logo">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <div class="logo-inner"><i class="fa-solid fa-store"></i></div>
                </div>
            </div>

            <!-- Heading -->
            <div class="heading">
                <h1>Store News Dashboard</h1>
                <p>Sign in to <span class="typed" id="typed"></span><span class="cursor">|</span></p>
            </div>

            <!-- ── LOGIN VIEW ── -->
            <div class="view" id="loginView">

                <div class="alert error" id="loginErr">
                    <i class="fa-solid fa-circle-exclamation" style="margin-top:1px;flex-shrink:0"></i>
                    <span id="loginErrMsg"></span>
                </div>

                <form id="loginForm" novalidate>
                    <div class="field">
                        <input type="email" id="email" placeholder=" " autocomplete="email" required />
                        <label for="email">Email address</label>
                        <i class="fa-solid fa-envelope f-icon"></i>
                        <i class="fa-solid fa-check valid-icon"></i>
                    </div>

                    <div class="field">
                        <input type="password" id="password" placeholder=" " autocomplete="current-password" required />
                        <label for="password">Password</label>
                        <i class="fa-solid fa-lock f-icon"></i>
                        <button type="button" class="pw-btn" id="pwToggle">
                            <i class="fa-solid fa-eye" id="pwEye"></i>
                        </button>
                    </div>

                    <div class="extras">
                        <label class="remember">
                            <input type="checkbox" id="rememberMe" />
                            <span class="track"></span>
                            Remember me
                        </label>
                        <button type="button" class="forgot-btn" id="showReset">Forgot password?</button>
                    </div>

                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <span id="loginBtnText">Sign in</span>
                    </button>
                </form>
            </div>

            <!-- ── FORGOT PASSWORD VIEW ── -->
            <div class="view hidden" id="resetView">

                <button class="back-btn" id="backBtn">
                    <i class="fa-solid fa-arrow-left"></i> Back to sign in
                </button>

                <div class="alert error" id="resetErr">
                    <i class="fa-solid fa-circle-exclamation" style="margin-top:1px;flex-shrink:0"></i>
                    <span id="resetErrMsg"></span>
                </div>
                <div class="alert success" id="resetOk">
                    <i class="fa-solid fa-circle-check pop" style="margin-top:1px;flex-shrink:0"></i>
                    <span>Reset link sent — check your inbox.</span>
                </div>

                <p style="font-size:0.82rem;color:var(--muted);margin-bottom:1.1rem;line-height:1.65;">
                    Enter your work email and we'll send a secure link to reset your password.
                </p>

                <form id="resetForm" novalidate>
                    <div class="field">
                        <input type="email" id="resetEmail" placeholder=" " autocomplete="email" required />
                        <label for="resetEmail">Email address</label>
                        <i class="fa-solid fa-envelope f-icon"></i>
                        <i class="fa-solid fa-check valid-icon"></i>
                    </div>

                    <button type="submit" class="btn btn-primary" id="resetBtn">
                        <span id="resetBtnText">Send reset link</span>
                    </button>
                </form>
            </div>

            <div class="footer">Access restricted to authorised RetailStat analysts only.</div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ── Supabase ─────────────────────────────────────────────────────────────
    const SUPABASE_URL  = "https://ffxkqaetxxpbtwvljmhv.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmeGtxYWV0eHhwYnR3dmxqbWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDE5NjIsImV4cCI6MjA5Mjk3Nzk2Mn0.qwYStWgM5DKQhJX3EtC2rjwMk49aejosEJmW5b60h8U";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Redirect if already logged in
    (async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) window.location.replace("./index.html");
    })();

    // ── Canvas Particles ──────────────────────────────────────────────────────
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    let pts = [];

    function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    for (let i = 0; i < 90; i++) pts.push({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        r: Math.random() * 1.4 + 0.3,
        dx: (Math.random() - 0.5) * 0.28,
        dy: (Math.random() - 0.5) * 0.28,
        a: Math.random() * 0.35 + 0.08,
    });

    (function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pts.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(148,163,184,${p.a})`;
            ctx.fill();
            p.x += p.dx; p.y += p.dy;
            if (p.x < 0 || p.x > canvas.width)  p.dx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        });
        requestAnimationFrame(draw);
    })();

    // ── Typing animation ──────────────────────────────────────────────────────
    const phrases = ['your analyst portal', 'retail intelligence', 'store analytics', 'market insights'];
    let pi = 0, ci = 0, del = false;
    const typedEl = document.getElementById('typed');

    (function type() {
        const p = phrases[pi];
        typedEl.textContent = del ? p.slice(0, --ci) : p.slice(0, ++ci);
        if (!del && ci === p.length) { del = true; setTimeout(type, 2000); return; }
        if (del && ci === 0)         { del = false; pi = (pi + 1) % phrases.length; }
        setTimeout(type, del ? 48 : 82);
    })();

    // ── Email validation checkmark ────────────────────────────────────────────
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    ['email', 'resetEmail'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', () => el.classList.toggle('valid', emailRe.test(el.value)));
    });

    // ── Password visibility toggle ────────────────────────────────────────────
    document.getElementById('pwToggle').addEventListener('click', () => {
        const pw  = document.getElementById('password');
        const eye = document.getElementById('pwEye');
        const show = pw.type === 'password';
        pw.type = show ? 'text' : 'password';
        eye.className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });

    // ── View switch ───────────────────────────────────────────────────────────
    document.getElementById('showReset').addEventListener('click', () => {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('resetView').classList.remove('hidden');
    });
    document.getElementById('backBtn').addEventListener('click', () => {
        document.getElementById('resetView').classList.add('hidden');
        document.getElementById('loginView').classList.remove('hidden');
        hide(document.getElementById('resetErr'));
        hide(document.getElementById('resetOk'));
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    const show = el => el.classList.add('show');
    const hide = el => el.classList.remove('show');

    function setLoading(btn, textEl, loading, label) {
        btn.disabled = loading;
        textEl.innerHTML = loading ? '<span class="spin"></span>' : label;
    }

    function shake() {
        const c = document.getElementById('mainCard');
        c.classList.remove('shake');
        void c.offsetWidth;
        c.classList.add('shake');
    }

    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const r    = document.createElement('span');
            r.className = 'ripple';
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
            this.appendChild(r);
            setTimeout(() => r.remove(), 560);
        });
    });

    // ── Login form ────────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const btn  = document.getElementById('loginBtn');
        const txt  = document.getElementById('loginBtnText');
        const err  = document.getElementById('loginErr');
        const errM = document.getElementById('loginErrMsg');
        hide(err);
        setLoading(btn, txt, true);

        const email    = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        const { error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
            setLoading(btn, txt, false, 'Sign in');
            shake();
            errM.textContent = error.message.includes('Invalid login credentials')
                ? 'Incorrect email or password. Please try again.'
                : error.message.includes('Email not confirmed')
                ? 'Account not confirmed. Contact your administrator.'
                : error.message;
            show(err);
            return;
        }

        // Success state
        txt.innerHTML = '<i class="fa-solid fa-check pop"></i> Signed in!';
        btn.style.background = 'linear-gradient(135deg,#059669,#10b981)';
        btn.style.boxShadow  = '0 8px 24px rgba(16,185,129,0.35)';
        setTimeout(() => window.location.replace('./index.html'), 850);
    });

    // ── Forgot password form ──────────────────────────────────────────────────
    // After clicking the reset email link, users land on reset-password.html
    const RESET_REDIRECT = "https://suryakantr10.github.io/banner_news_article/reset-password.html";

    document.getElementById('resetForm').addEventListener('submit', async e => {
        e.preventDefault();
        const btn  = document.getElementById('resetBtn');
        const txt  = document.getElementById('resetBtnText');
        const err  = document.getElementById('resetErr');
        const errM = document.getElementById('resetErrMsg');
        const ok   = document.getElementById('resetOk');
        hide(err); hide(ok);
        setLoading(btn, txt, true);

        const email = document.getElementById('resetEmail').value.trim().toLowerCase();
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: RESET_REDIRECT });

        setLoading(btn, txt, false, 'Send reset link');

        if (error) {
            errM.textContent = error.message;
            show(err);
        } else {
            show(ok);
            document.getElementById('resetForm').reset();
            document.getElementById('resetEmail').classList.remove('valid');
        }
    });
</script>
</body>
</html>
