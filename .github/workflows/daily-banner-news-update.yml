name: Daily Banner News Update

# Runs every day at 09:00 UTC
# To change the time, modify the cron schedule below (format: minute hour day month weekday)
# Example: "0 14 * * *" = 2:00 PM UTC, "0 9 * * 1-5" = 9:00 AM UTC on weekdays only
on:
  schedule:
    - cron: '30 23 * * *'  # 5:00 IST daily
  workflow_dispatch:  # Allows manual triggering from GitHub Actions tab

permissions:
  contents: write  # Required to commit and push files

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Fetch full history so rebase works correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install feedparser pandas python-dateutil supabase

      - name: Run news fetcher
        run: python fetch_banner_store_news.py

      - name: Sync master file to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_to_supabase.py

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add latest_news.json
          git add data/store_news/banner_news_*.csv || true
          git add data/store_news/json_archive/latest_news_*.json || true
          git add master_file/ || true
          git diff --staged --quiet || git commit -m "Auto-update: Daily news fetch $(date +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git fetch origin main && git rebase origin/main && git push origin main && break
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done