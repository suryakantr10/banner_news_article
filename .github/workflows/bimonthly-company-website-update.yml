name: Bi-Monthly Company Website Scraper

on:
  schedule:
    - cron: '0 2 1 * *'   # 1st of every month  at 2:00 AM UTC
    - cron: '0 2 15 * *'  # 15th of every month at 2:00 AM UTC
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium beautifulsoup4 pandas openpyxl requests

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Run Company Website scraper
        run: python company_website_comingsoon.py

      - name: Commit and push JSON
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/company_website_latest.json
          git diff --staged --quiet || git commit -m "Auto-update: Company Website scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git fetch origin main
          git rebase origin/main
          git push origin main
