name: Daily Business Debut Update

# Runs every day at 4:00 AM IST (22:30 UTC previous day)
# To change the time, modify the cron schedule below (format: minute hour day month weekday)
# Example: "30 22 * * *" = 4:00 AM IST (UTC+5:30)

on:
  schedule:
    - cron: '30 22 * * *'  # 4:00 AM IST daily
  workflow_dispatch:  # Allows manual triggering from GitHub Actions tab

permissions:
  contents: write  # Required to commit and push files

jobs:
  update-businessdebut:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Run Business Debut scraper
        run: |
          python businessdebut_scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add businessdebut_latest.json
          git add businessdebut_articles_*.csv || true
          git diff --staged --quiet || git commit -m "Auto-update: Daily Business Debut fetch $(date +'%Y-%m-%d')"
          git push
