name: Daily WARN Notices Update

on:
  schedule:
    - cron: '30 0 * * *'  # 12:30 AM UTC = 6:00 AM IST daily
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  warn-scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pandas playwright nest_asyncio

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run WARN scraper
        run: python warn.py

      - name: Convert CSV to JSON
        run: |
          python - <<'EOF'
          import pandas as pd, json
          from pathlib import Path
          from datetime import date

          today = date.today().strftime('%Y-%m-%d')
          csv_path = Path(f'warn_output/warn_combined_{today}.csv')

          if not csv_path.exists():
              # fallback: pick the most recent combined CSV in warn_output/
              candidates = sorted(Path('warn_output').glob('warn_combined_*.csv'), reverse=True)
              if candidates:
                  csv_path = candidates[0]
                  print(f'Using fallback CSV: {csv_path}')
              else:
                  print('No combined CSV found — skipping JSON export.')
                  exit(0)

          df = pd.read_csv(csv_path).fillna('')
          # Ensure all values are plain strings for clean JSON
          for col in df.columns:
              df[col] = df[col].astype(str).str.strip()

          out = {
              'last_updated': today,
              'total': len(df),
              'data': df.to_dict(orient='records')
          }
          with open('warn_latest.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, indent=2, ensure_ascii=False)

          print(f'warn_latest.json written — {len(df)} rows')
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add warn_latest.json
          git add warn_output/ || true
          git diff --staged --quiet || git commit -m "Auto-update: Daily WARN fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
          git fetch origin main
          git rebase origin/main
          git push origin main
