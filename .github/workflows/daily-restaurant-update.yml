name: Daily Restaurant News Update

on:
  schedule:
    - cron: '15 21 * * *'  # 2:45 AM IST daily (staggered from Business Debut)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # ← CHANGED: full clone so rebase works properly

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Set Chrome paths
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium beautifulsoup4 requests pandas openpyxl webdriver-manager supabase

      - name: Run restaurant scraper
        run: python restaurant_scraper.py

      - name: Sync master file to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_to_supabase.py

      - name: Commit and push JSON + CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add restaurant_latest.json || true
          git add data/restaurant/ || true
          git add master_file/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily restaurant update $(date -u '+%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying in 15s..."
              sleep 15
            done
          fi