name: Daily Restaurant News Update

on:
  schedule:
    - cron: '40 23 * * *'  # 11:30 PM UTC = 5:00 AM IST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # ← CHANGED: full clone so rebase works properly

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium beautifulsoup4 requests pandas openpyxl webdriver-manager

      - name: Run restaurant scraper
        run: python restaurant_scraper.py

      - name: Commit and push JSON + CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch latest remote changes
          git fetch origin main

          # Try to rebase; if it fails, reset and retry
          if ! git rebase origin/main; then
            echo "Rebase conflict detected, resetting..."
            git rebase --abort
            git reset --hard origin/main
          fi

          git add restaurant_latest.json Daily_restaurants_*.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily restaurant update $(date -u '+%Y-%m-%d %H:%M UTC')"

            # Retry push up to 3 times
            for i in 1 2 3; do
              if git push origin main; then
                echo "Push successful"
                break
              fi
              echo "Push failed (attempt $i/3), rebasing and retrying..."
              git pull --rebase origin main
              sleep $((5 * i))
            done
          fi