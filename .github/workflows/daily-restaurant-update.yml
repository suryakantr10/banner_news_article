name: Daily Restaurant News Update

on:
  schedule:
    - cron: '30 23 * * *'  # 11:30 PM UTC = 5:00 AM IST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2        # ← Node.js 24 compatible
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2  # ← Node.js 24 compatible
        with:
          chrome-version: stable

      - name: Set up Python
        uses: actions/setup-python@v5.6.0     # ← Node.js 24 compatible
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium beautifulsoup4 requests pandas openpyxl webdriver-manager

      - name: Run restaurant scraper
        run: python restaurant_scraper.py

      - name: Commit and push JSON + CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add restaurant_latest.json Daily_restaurants_*.csv
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily restaurant update $(date +'%Y-%m-%d %H:%M UTC')" && \
            git push