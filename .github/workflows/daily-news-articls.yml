name: Daily Retail News Scraper

on:
  schedule:
    - cron: "0 21 * * *"    # 10:30 PM UTC = 2:30 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Job 1: Opening keywords ────────────────────────────
  scrape-opening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser pandas python-dateutil requests python-dotenv googlenewsdecoder openpyxl

      - name: Run scraper (opening keywords)
        env:
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
        run: python daily_news_articles.py --mode opening

      - name: Upload opening results
        uses: actions/upload-artifact@v4
        with:
          name: news-opening
          path: docs/news_data_opening.json

  # ── Job 2: Closing keywords ────────────────────────────
  scrape-closing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser pandas python-dateutil requests python-dotenv googlenewsdecoder openpyxl

      - name: Run scraper (closing keywords)
        env:
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
        run: python daily_news_articles.py --mode closing

      - name: Upload closing results
        uses: actions/upload-artifact@v4
        with:
          name: news-closing
          path: docs/news_data_closing.json

  # ── Job 3: Merge + commit (runs after both finish) ─────
  merge:
    needs: [scrape-opening, scrape-closing]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pandas openpyxl supabase

      - name: Download opening results
        uses: actions/download-artifact@v4
        with:
          name: news-opening
          path: docs

      - name: Download closing results
        uses: actions/download-artifact@v4
        with:
          name: news-closing
          path: docs

      - name: Merge results
        run: python merge_results.py

      - name: Sync master file to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_to_supabase.py

      - name: Commit output files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull latest before staging so there are no local commits to conflict during rebase
          git pull --rebase origin main
          git add docs/news_data.json || true
          git add master_file/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily news update $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Retry push up to 3 times in case another job races us
            for i in 1 2 3; do
              git push origin main && break
              echo "Push attempt $i failed, pulling and retrying..."
              git pull --rebase origin main
            done
          fi
