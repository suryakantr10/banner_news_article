name: Daily Retail News Scraper

on:
  schedule:
    - cron: "30 21 * * *"    # 9:30 PM UTC = 3:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser pandas python-dateutil requests python-dotenv googlenewsdecoder openpyxl

      - name: Run scraper
        env:
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
        run: python daily_news_articles.py

      - name: Commit output files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_news_latest.json
          git add daily_news_*.json || true
          git diff --cached --quiet || git commit -m "Auto-update: Daily news fetch $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main